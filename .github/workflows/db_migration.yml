name: Initializing Database

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  init-db:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: proptisharma-07/new-2-tier
          ref: main

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::250063290505:role/propti-07-create-new-policy
          aws-region: eu-north-1

      - name: Upload files to S3
        run: |
          aws s3 mb s3://250063290505-devops-scripts --region eu-north-1 2>/dev/null || true
          aws s3 cp init.sql s3://250063290505-devops-scripts/init.sql --region eu-north-1
          aws s3 cp init.py s3://250063290505-devops-scripts/init.py --region eu-north-1
          echo "✅ Files uploaded to S3"

      - name: Initialize Database on RDS using EC2
        id: init
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "aws s3 cp s3://250063290505-devops-scripts/init.py /tmp/init.py",
              "python3 /tmp/init.py || exit 1",
              "rm -f /tmp/init.py"
            ]}' \
            --query 'Command.CommandId' \
            --output text \
            --region eu-north-1)

          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"

      - name: Show Results
        run: |
          sleep 30

          aws ssm list-command-invocations \
            --command-id "${{ steps.init.outputs.cmd_id }}" \
            --details \
            --region eu-north-1 \
            --output text

          FAILED=$(aws ssm list-command-invocations \
            --command-id "${{ steps.init.outputs.cmd_id }}" \
            --query "length(CommandInvocations[?Status=='Failed'])" \
            --output text \
            --region eu-north-1)

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::Database creation failed on $FAILED instance(s)!"
            exit 1
          fi

          echo "✅ Database created successfully"